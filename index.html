<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Asia Henna | Luxury Henna Art</title>

<style>
body{
margin:0;
font-family:Arial, sans-serif;
background:#0f0f0f;
color:white;
}

header{
text-align:center;
padding:60px 20px;
background:black;
}

h1{
color:#d4af37;
font-size:40px;
}

section{
padding:40px 20px;
max-width:1000px;
margin:auto;
}

h2{
color:#d4af37;
text-align:center;
}

.gallery{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(150px,1fr));
gap:10px;
}

.gallery img{
width:100%;
border-radius:10px;
cursor:pointer;
transition:0.3s;
}

.gallery img:hover{
transform:scale(1.05);
}

.price-box{
background:#1b1b1b;
padding:15px;
margin:10px 0;
border-radius:10px;
text-align:center;
}

.button{
display:inline-block;
background:#d4af37;
color:black;
padding:12px 18px;
text-decoration:none;
border-radius:8px;
font-weight:bold;
margin:5px;
}

.center{
text-align:center;
}

input, select{
width:100%;
padding:10px;
margin:5px 0;
border-radius:5px;
border:none;
}

form{
background:#1b1b1b;
padding:20px;
border-radius:10px;
}

#popup{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.9);
display:none;
align-items:center;
justify-content:center;
}

#popup img{
max-width:90%;
max-height:90%;
}
</style>
</head>

<body>

<header>
<h1>Asia Henna</h1>
<p>Luxury Henna Art in Charlotte, NC</p>

<a class="button" href="https://wa.me/17046616428" target="_blank">
📲 Book on WhatsApp
</a>
</header>

<section>
<h2>Gallery</h2>
<div class="gallery">

<img src="IMG_9585.jpeg" onclick="openImg(this.src)">
<img src="IMG_9586.jpeg" onclick="openImg(this.src)">
<img src="IMG_9587.jpeg" onclick="openImg(this.src)">
<img src="IMG_9588.jpeg" onclick="openImg(this.src)">
<img src="IMG_9589.jpeg" onclick="openImg(this.src)">
<img src="IMG_9590.jpeg" onclick="openImg(this.src)">
<img src="IMG_9592.jpeg" onclick="openImg(this.src)">
<img src="IMG_9593.jpeg" onclick="openImg(this.src)">
<img src="IMG_9594.jpeg" onclick="openImg(this.src)">
<img src="IMG_9595.jpeg" onclick="openImg(this.src)">

</div>
</section>

<section>
<h2>Pricing</h2>

<div class="price-box">One Hand - $25</div>
<div class="price-box">Two Hands - $40</div>
<div class="price-box">Full Hand - $30 each</div>
<div class="price-box">Full Package (Hands + Legs) - $60</div>
<div class="price-box">Custom Design - $35 per hand</div>
<div class="price-box">Custom Leg Design - $20 per leg</div>

</section>

<section>
<h2>Book Appointment</h2>

<form onsubmit="sendBooking(event)">
<input id="name" placeholder="Full Name" required>
<input id="phone" placeholder="Phone Number" required>
<input id="date" type="date" required>

<select id="service">
<option>One Hand</option>
<option>Two Hands</option>
<option>Full Package</option>
<option>Custom Design</option>
</select>

<button class="button" type="submit">Submit Booking</button>
</form>

</section>

<section class="center">
<h2>Contact</h2>

<a class="button" href="mailto:asia.henna247@gmail.com">
📧 Email Now
</a>

</section>

<div id="popup" onclick="closeImg()">
<img id="popupImg">
</div>

<script>
function openImg(src){
document.getElementById("popup").style.display="flex";
document.getElementById("popupImg").src=src;
}

function closeImg(){
document.getElementById("popup").style.display="none";
}

function sendBooking(e){
e.preventDefault();

alert("Booking sent! Asia Henna will contact you soon.");

document.getElementById("name").value="";
document.getElementById("phone").value="";
document.getElementById("date").value="";
}
</script>

</body>
</html>
