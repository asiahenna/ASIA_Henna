<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Asia Henna | Charlotte NC</title>

<style>
body{
margin:0;
font-family:Arial, sans-serif;
background:#120806;
color:white;
}

.hero{
text-align:center;
padding:60px 20px;
background:linear-gradient(rgba(0,0,0,0.6),rgba(0,0,0,0.8)),
url("IMG_9585.jpeg");
background-size:cover;
background-position:center;
}

.hero h1{
font-size:48px;
color:#d4af37;
}

section{
padding:40px 20px;
max-width:900px;
margin:auto;
}

.title{
text-align:center;
color:#d4af37;
}

.price{
background:#1b0d09;
padding:15px;
margin:10px 0;
border-radius:10px;
}

input,select,textarea{
width:100%;
padding:12px;
margin:8px 0;
border-radius:10px;
border:none;
}

button{
width:100%;
padding:14px;
background:#d4af37;
border:none;
border-radius:10px;
font-weight:bold;
cursor:pointer;
}

.contact{
text-align:center;
line-height:2;
}

.gallery img{
width:100%;
border-radius:10px;
margin:5px 0;
}

a{
color:#d4af37;
}

</style>
</head>

<body>

<div class="hero">
<h1>Asia Henna</h1>
<p>Luxury Henna Art | Charlotte, NC</p>
</div>

<section>
<h2 class="title">Pricing</h2>

<div class="price">
Hand Henna — <b>$29.99</b> (First-time customers)
</div>

<div class="price">
Leg Henna — <b>$34.99</b> (First-time customers)
</div>
</section>

<section>
<h2 class="title">Book an Appointment</h2>

<form id="bookingForm">

<input id="name" placeholder="Your Name" required>
<input id="phone" placeholder="Phone Number" required>

<select id="service">
<option>Hand Henna</option>
<option>Leg Henna</option>
<option>Bridal Henna</option>
</select>

<input type="date" id="date" required>
<input type="time" id="time" required>

<textarea id="message" placeholder="Message / Design Request"></textarea>

<button type="submit">Send Booking Request</button>

</form>
</section>

<section class="contact">
<h2 class="title">Contact</h2>

📞 (980) 613-2634 <br>
📧 asia.henna247@gmail.com <br>

📸 
<a href="https://www.instagram.com/hen_nabyqueen_11" target="_blank">
@hen_nabyqueen_11
</a>

</section>

<script>
document.getElementById("bookingForm").addEventListener("submit", function(e){
e.preventDefault();

let name = document.getElementById("name").value;
let phone = document.getElementById("phone").value;
let service = document.getElementById("service").value;
let date = document.getElementById("date").value;
let time = document.getElementById("time").value;
let message = document.getElementById("message").value;

let subject = "New Henna Booking Request";

let body =
`Name: ${name}
Phone: ${phone}
Service: ${service}
Date: ${date}
Time: ${time}
Message: ${message}`;

window.location.href =
`mailto:asia.henna247@gmail.com?subject=${encodeURIComponent(subject)}&body=${encodeURIComponent(body)}`;

});
</script>

</body>
</html>
