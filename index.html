<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Asia Henna | Booking</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #0f0f0f;
  color: white;
}

header {
  text-align: center;
  padding: 50px 20px;
}

h1 {
  color: gold;
  font-size: 40px;
}

.container {
  max-width: 500px;
  margin: auto;
  background: #1b1b1b;
  padding: 20px;
  border-radius: 15px;
}

input, select {
  width: 100%;
  padding: 12px;
  margin: 10px 0;
  border-radius: 8px;
  border: none;
}

button {
  width: 100%;
  padding: 12px;
  background: gold;
  border: none;
  font-weight: bold;
  border-radius: 8px;
  cursor: pointer;
}

button:hover {
  background: #e6c200;
}

.success {
  color: lightgreen;
  margin-top: 10px;
}
</style>
</head>

<body>

<header>
  <h1>Asia Henna</h1>
  <p>Luxury Henna Booking</p>
</header>

<div class="container">

  <input id="name" placeholder="Your Name">
  <input id="phone" placeholder="Phone Number">

  <select id="service">
    <option>Hand Henna</option>
    <option>Leg Henna</option>
    <option>Bridal Henna</option>
  </select>

  <input type="date" id="date">
  <input type="time" id="time">

  <button onclick="book()">Send Booking</button>

  <p class="success" id="msg"></p>
</div>

<script>
function book() {
  const data = {
    name: document.getElementById("name").value,
    phone: document.getElementById("phone").value,
    service: document.getElementById("service").value,
    date: document.getElementById("date").value,
    time: document.getElementById("time").value
  };

  fetch("PASTE_YOUR_APPS_SCRIPT_URL_HERE", {
    method: "POST",
    body: JSON.stringify(data)
  })
  .then(res => res.text())
  .then(() => {
    document.getElementById("msg").innerText =
      "Booking sent! We will confirm soon 💛";
  });
}
</script>

</body>
</html>
