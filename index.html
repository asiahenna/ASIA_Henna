<section>
<h2 class="title">Book / Custom Request</h2>

<p style="text-align:center;opacity:0.8;">
Custom designs welcome — upload an image or describe your idea for pricing.
</p>

<form action="https://formsubmit.co/asia.henna247@gmail.com"
method="POST"
enctype="multipart/form-data">

<!-- 🔒 security -->
<input type="hidden" name="_captcha" value="false">

<!-- ✅ AUTO EMAIL TO CUSTOMER -->
<input type="hidden" name="_autoresponse"
value="✨ Thank you for booking Asia Henna! We received your request and will confirm your appointment shortly. ✨">

<!-- optional redirect after submit -->
<input type="hidden" name="_next"
value="https://asiahennna.github.io/thankyou.html">

<input type="text" name="Name" placeholder="Your Name" required>

<input type="text" name="Phone" placeholder="Phone Number" required>

<input type="email" name="Email" placeholder="Your Email (for confirmation)" required>

<select name="Service" required>
<option value="">Select Service</option>
<option>Hand Henna</option>
<option>Leg Henna</option>
<option>Custom Design</option>
</select>

<input type="date" name="Date" required>
<input type="time" name="Time" required>

<textarea name="Details"
placeholder="Describe your design or request..."
required></textarea>

<label style="display:block;margin-top:10px;">
Upload Reference Image (optional)
</label>

<input type="file" name="Attachment" accept="image/*">

<br><br>

<button type="submit">
Send Booking Request
</button>

</form>
</section>
