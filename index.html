<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Asia Henna | Luxury Henna Art</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0f0f0f;
      color: white;
    }

    header {
      text-align: center;
      padding: 60px 20px;
      background: #000;
    }

    h1 {
      color: #d4af37;
      margin-bottom: 10px;
    }

    section {
      padding: 40px 20px;
      max-width: 900px;
      margin: auto;
    }

    .gallery {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));

    }

    .price-box {
      background: #1b1b1b;

    }

      background: #d4af37;
      color: black;
      padding: 12px 20px;
      text-decoration: none;
      border-radius: 8px;
      font-weight: bold;
    }

    .center {
      text-align: center;
    }

    footer {
      text-align: center;
      padding: 30px;
      font-size: 14px;
      opacity: 0.7;
    }
  </style>
</head>

<body>

  <!-- HEADER -->
  <header>

    </div>
