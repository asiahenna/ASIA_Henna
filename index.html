<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Asia Henna | Charlotte NC</title>

<style>

body{
margin:0;
font-family:Arial, sans-serif;
background:#120806;
color:white;
}

header{
text-align:center;
padding:40px 20px;
}

h1{
color:#d4af37;
font-size:42px;
margin:0;
}

.gallery{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(140px,1fr));
gap:10px;
padding:20px;
}

.gallery img{
width:100%;
height:180px;
object-fit:cover;
border-radius:12px;
}

.section-title{
text-align:center;
color:#d4af37;
margin-top:30px;
}

.price-box{
background:#1b1b1b;
padding:18px;
margin:10px 20px;
border-radius:12px;
}

.booking{
text-align:center;
padding:30px 20px;
}

input,select,textarea{
width:100%;
padding:14px;
margin:8px 0;
border-radius:10px;
border:none;
}

button{
width:100%;
padding:15px;
border-radius:10px;
border:none;
background:#d4af37;
font-weight:bold;
cursor:pointer;
}

.badge{
background:#25D366;
color:white;
padding:8px 15px;
border-radius:20px;
font-size:13px;
display:inline-block;
margin-bottom:10px;
}

.urgent{
color:#d4af37;
text-align:center;
margin-bottom:10px;
}

.whatsapp-float{
position:fixed;
bottom:20px;
right:20px;
background:#25D366;
color:white;
padding:15px 18px;
border-radius:50px;
text-decoration:none;
font-weight:bold;
}

footer{
text-align:center;
padding:30px;
opacity:0.8;
}

</style>
</head>

<body>

<header>
<h1>Asia Henna</h1>
<p>Luxury Henna Art in Charlotte, NC</p>
</header>

<h2 class="section-title">Gallery</h2>

<div class="gallery">
<img src="IMG_9585.jpeg">
<img src="IMG_9586.jpeg">
<img src="IMG_9587.jpeg">
<img src="IMG_9588.jpeg">
<img src="IMG_9589.jpeg">
<img src="IMG_9590.jpeg">
<img src="IMG_9592.jpeg">
<img src="IMG_9593.jpeg">
<img src="IMG_9594.jpeg">
<img src="IMG_9595.jpeg">
</div>

<h2 class="section-title">Pricing</h2>

<div class="price-box">Hand Henna - $25+</div>
<div class="price-box">Leg Henna - $20+</div>
<div class="price-box">Bridal Henna - Custom Quote</div>

<h2 class="section-title">Request Booking</h2>

<div class="booking">

<div class="badge">⚡ Instant WhatsApp Booking Active</div>
<div class="urgent">🔥 Limited availability — book early</div>

<form onsubmit="sendBooking(event)">

<input id="name" placeholder="Your Name" required>
<input id="phone" placeholder="Phone Number" required>

<select id="service" required>
<option value="">Select Service</option>
<option>Hand Henna</option>
<option>Leg Henna</option>
<option>Bridal Henna</option>
<option>Event Henna</option>
</select>

<input type="date" id="date" required>
<input type="time" id="time" required>

<textarea id="message" placeholder="Notes"></textarea>

<button type="submit">Send Booking Request</button>

</form>
</div>

<footer>
Asia Henna ❤️ | Charlotte, NC<br>
📞 704-661-6428<br>
📧 asia.henna247@gmail.com
</footer>

<a class="whatsapp-float"
href="https://wa.me/17046616428?text=Hi%20I%20want%20to%20book%20henna"
target="_blank">
WhatsApp
</a>

<script>
function sendBooking(e){
e.preventDefault();

let name=document.getElementById("name").value;
let phone=document.getElementById("phone").value;
let service=document.getElementById("service").value;
let date=document.getElementById("date").value;
let time=document.getElementById("time").value;
let message=document.getElementById("message").value;

let text=
`✨ Asia Henna Booking Request ✨%0A%0A
Name: ${name}%0A
Phone: ${phone}%0A
Service: ${service}%0A
Date: ${date}%0A
Time: ${time}%0A
Notes: ${message}`;

window.open(
"https://wa.me/17046616428?text=" + text,
"_blank"
);
}
</script>

</body>
</html>
